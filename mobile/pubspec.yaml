name: edustack_mobile
description: EduStack PK — School ERP for students, teachers and staff.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP client
  dio: ^5.4.3

  # Secure token storage (keychain / keystore)
  flutter_secure_storage: ^9.2.2

  # Preferences (org slug, theme, language)
  shared_preferences: ^2.3.2

  # Local offline database
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # QR scanner (camera)
  mobile_scanner: ^5.1.1

  # QR code renderer (display QR on screen)
  qr_flutter: ^4.1.0

  # Push notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Charts
  fl_chart: ^0.68.0

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1
  open_filex: ^4.4.1

  # Image picker
  image_picker: ^1.1.2

  # Localization
  intl: ^0.20.2
  easy_localization: ^3.0.7

  # Connectivity
  connectivity_plus: ^6.0.3

  # Cached images
  cached_network_image: ^3.3.1

  # Relative time ("2 hours ago")
  timeago: ^3.6.1

  # SVG support
  flutter_svg: ^2.0.10+1

  # Local notifications (scheduled fee reminders)
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/translations/en.json
    - assets/translations/ur.json
    - assets/images/

  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1e3a5f"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"

flutter_native_splash:
  color: "#1e3a5f"
  image: assets/images/splash_logo.png
  android_12:
    color: "#1e3a5f"
    image: assets/images/splash_logo.png
  fullscreen: false
